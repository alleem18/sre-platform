name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'service-a/**'
      - 'service-b/**'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service-a
        uses: docker/build-push-action@v5
        with:
          context: ./service-a
          push: true
          tags: ghcr.io/alleem18/sre-platform-service-a:${{ github.sha }}

      - name: Build and push service-b
        uses: docker/build-push-action@v5
        with:
          context: ./service-b
          push: true
          tags: ghcr.io/alleem18/sre-platform-service-b:${{ github.sha }}

      - name: Bump image tags in manifests
        run: |
          sed -i "s|image: ghcr.io/alleem18/sre-platform-service-a:.*|image: ghcr.io/alleem18/sre-platform-service-a:${{ github.sha }}|" k8s/service-a-deployment.yaml
          sed -i "s|image: ghcr.io/alleem18/sre-platform-service-b:.*|image: ghcr.io/alleem18/sre-platform-service-b:${{ github.sha }}|" k8s/service-b-deployment.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/service-a-deployment.yaml k8s/service-b-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: bump image tags to ${{ github.sha }}"
          git push origin HEAD:gitops
