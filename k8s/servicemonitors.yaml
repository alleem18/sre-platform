metadata:
  name: service-b
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: service-b
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
